<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <style>
        /* ensure full viewport and reset margin */
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* background container with blur effect */
        body {
            background: url("wallhaven-oxyq3m.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        /* an overlay to apply blur without affecting children */
        .bg-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(25px); /* around 50% blur equivalent */
            z-index: -1;
        }

        .title-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.2); /* semi-transparent */
            padding: 2rem 3rem;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            text-align: center;
            color: #000;
        }

        .title-card h1 {
            margin: 0;
            font-size: 3rem;
            font-family: Arial, sans-serif;
        }

        .start-button {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background-color: #7d9f3f;
            color: #fff;
            text-decoration: none;
            font-size: 1.25rem;
            border-radius: 5px;
            transition: box-shadow 0.3s ease;
        }

        .start-button:hover {
            box-shadow: 0 0 15px rgba(30, 78, 156, 0.75);
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <div class="title-card">
        <h1>Finance and Budget Manager</h1>
        <a class="start-button" href="tracker.html">Get Started</a>
    </div>
</body>
</html>
